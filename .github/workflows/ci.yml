name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  twine:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - shell: pwsh
        run: ./tools/bootstrap_tweego.ps1
      - run: python tools/check_release.py --clean
